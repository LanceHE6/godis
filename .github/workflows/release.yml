name: Release

on:
  push:
    tags:
      - 'v*'
      - 'V*'

permissions:
  contents: write

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest

    strategy:
      matrix:
        target:
          - { os: linux,   arch: amd64, ext: "" }
          - { os: linux,   arch: arm64, ext: "" }
          - { os: darwin,  arch: amd64, ext: "" }
          - { os: darwin,  arch: arm64, ext: "" }
          - { os: windows, arch: amd64, ext: ".exe" }

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build frontend
        run: |
          cd web
          npm install
          npm run build
          cd ..

      - name: Build Go
        env:
          GOOS: ${{ matrix.target.os }}
          GOARCH: ${{ matrix.target.arch }}
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%S)
          GIT_COMMIT=$(git rev-parse --short HEAD)
          LDFLAGS="-X godis/version.Version=${VERSION} -X godis/version.BuildTime=${BUILD_TIME} -X godis/version.GitCommit=${GIT_COMMIT}"
          mkdir -p build
          go build -ldflags "${LDFLAGS}" -o "build/godis-${{ matrix.target.os }}-${{ matrix.target.arch }}${{ matrix.target.ext }}" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: godis-${{ matrix.target.os }}-${{ matrix.target.arch }}
          path: build/godis-${{ matrix.target.os }}-${{ matrix.target.arch }}${{ matrix.target.ext }}

  changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    needs: build
    outputs:
      changelog: ${{ steps.changelog.outputs.body }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            echo "First release — generating full history since initial commit."
            LOG=$(git log --oneline --no-merges --format="- %s (%h)" HEAD)
          else
            echo "Changes since ${PREV_TAG}"
            LOG=$(git log --oneline --no-merges --format="- %s (%h)" ${PREV_TAG}..HEAD)
          fi

          # 写入文件，避免特殊字符在环境变量中出问题
          printf '%s\n' "$LOG" > /tmp/changelog.md

          # 读取为 action output
          BODY=$(cat /tmp/changelog.md)
          {
            echo "body<<EOF"
            echo "$BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build, changelog]

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: ${{ needs.changelog.outputs.changelog }}
          files: artifacts/*
          draft: false
          prerelease: false
          generate_release_notes: false
